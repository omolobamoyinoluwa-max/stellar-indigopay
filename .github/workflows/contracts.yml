name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths: [contracts/**]
  pull_request:
    branches: [main]
    paths: [contracts/**]
  workflow_dispatch:

jobs:
  test:
    name: Soroban Contracts (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Explicitly match the toolchain in contracts/rust-toolchain.toml so
          # the rustfmt and clippy components are installed for that version.
          # Without this, the action auto-detects the toolchain from the .toml
          # file but only installs components for the default "stable" channel,
          # causing "cargo-fmt not installed for toolchain '1.91.0'" errors.
          toolchain: 1.91.0
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM
        run: cargo build --workspace --target wasm32v1-none --release
